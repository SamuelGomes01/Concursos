<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — Ação Penal | TRF3</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #0d1b2a; color: #e0e6f0; min-height: 100vh; padding: 20px; }
  .container { max-width: 820px; margin: 0 auto; }
  header { text-align: center; padding: 28px 0 20px; }
  header h1 { font-size: 1.6rem; color: #4fc3f7; letter-spacing: 1px; }
  header p { font-size: 0.85rem; color: #90a4ae; margin-top: 6px; }
  .scoreboard { display: flex; justify-content: center; gap: 32px; margin: 16px 0 24px; }
  .score-box { background: #1c2f45; border-radius: 10px; padding: 10px 22px; text-align: center; }
  .score-box .label { font-size: 0.7rem; color: #90a4ae; text-transform: uppercase; letter-spacing: 1px; }
  .score-box .value { font-size: 1.7rem; font-weight: bold; color: #4fc3f7; }
  .question-card { background: #1c2f45; border-radius: 12px; padding: 24px; margin-bottom: 20px; border-left: 4px solid #1565c0; }
  .question-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .q-num { background: #1565c0; color: #fff; border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: bold; flex-shrink: 0; }
  .q-text { font-size: 0.97rem; line-height: 1.55; color: #cfd8e3; }
  .options { margin-top: 14px; display: flex; flex-direction: column; gap: 8px; }
  .option-btn { background: #243447; border: 1.5px solid #2e4560; color: #cfd8e3; border-radius: 8px; padding: 11px 16px; text-align: left; cursor: pointer; font-size: 0.9rem; line-height: 1.4; transition: all 0.2s; }
  .option-btn:hover:not(:disabled) { background: #2a4060; border-color: #4fc3f7; color: #fff; }
  .option-btn.correct { background: #1b4332; border-color: #40c057; color: #b2f2bb; }
  .option-btn.wrong { background: #4a1020; border-color: #f03e3e; color: #ffa8a8; }
  .option-btn.reveal-correct { background: #1b4332; border-color: #40c057; color: #b2f2bb; }
  .option-btn:disabled { cursor: default; }
  .feedback { margin-top: 14px; padding: 12px 16px; border-radius: 8px; font-size: 0.88rem; line-height: 1.5; display: none; }
  .feedback.show { display: block; }
  .feedback.correct-fb { background: #1b4332; border-left: 4px solid #40c057; color: #b2f2bb; }
  .feedback.wrong-fb { background: #4a1020; border-left: 4px solid #f03e3e; color: #ffa8a8; }
  .result-section { display: none; background: #1c2f45; border-radius: 12px; padding: 28px; text-align: center; margin-top: 8px; }
  .result-section.show { display: block; }
  .result-section h2 { font-size: 1.5rem; color: #4fc3f7; margin-bottom: 10px; }
  .result-section .final-score { font-size: 3rem; font-weight: bold; margin: 16px 0; }
  .result-section .result-msg { font-size: 0.95rem; color: #90a4ae; margin-bottom: 20px; }
  .btn-restart { background: #1565c0; color: #fff; border: none; border-radius: 8px; padding: 12px 28px; font-size: 1rem; cursor: pointer; transition: background 0.2s; }
  .btn-restart:hover { background: #1976d2; }
  .erros-section { margin-top: 20px; }
  .erros-section h3 { font-size: 0.9rem; color: #f03e3e; margin-bottom: 10px; }
  .erro-item { background: #2a1a1a; border-radius: 6px; padding: 8px 12px; font-size: 0.82rem; color: #ffa8a8; margin-bottom: 6px; }
  .progress-bar-wrap { background: #243447; border-radius: 10px; height: 6px; margin: 12px 0 24px; }
  .progress-bar { background: #4fc3f7; height: 6px; border-radius: 10px; transition: width 0.4s; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>⚖️ Quiz — Ação Penal</h1>
    <p>Direito Processual Penal · Estilo FCC · TRF3</p>
  </header>

  <div class="scoreboard">
    <div class="score-box">
      <div class="label">Acertos</div>
      <div class="value" id="acertos">0</div>
    </div>
    <div class="score-box">
      <div class="label">Erros</div>
      <div class="value" id="erros-count" style="color:#f03e3e">0</div>
    </div>
    <div class="score-box">
      <div class="label">Questão</div>
      <div class="value" id="q-atual">1/5</div>
    </div>
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progress" style="width:0%"></div>
  </div>

  <div id="quiz-area"></div>

  <div class="result-section" id="result">
    <h2>Quiz Finalizado!</h2>
    <div class="final-score" id="final-score"></div>
    <div class="result-msg" id="result-msg"></div>
    <button class="btn-restart" onclick="restart()">🔄 Refazer Quiz</button>
    <div class="erros-section" id="erros-section"></div>
  </div>
</div>

<script>
const questoes = [
  {
    enunciado: `De acordo com o Código de Processo Penal, a ação penal pública, nos crimes em que a lei assim não especifica, é promovida pelo Ministério Público mediante denúncia. Sobre as espécies de ação penal e seus princípios correlatos, assinale a alternativa CORRETA.`,
    opcoes: [
      "A) A ação penal pública incondicionada é regida pelo princípio da oportunidade, visto que o Ministério Público pode optar por não oferecer denúncia quando julgar conveniente.",
      "B) Na ação penal pública condicionada à representação, após o oferecimento da denúncia pelo Ministério Público, a representação do ofendido torna-se irretratável.",
      "C) A ação penal privada é regida pelo princípio da indisponibilidade, impedindo que o querelante desista da ação após o seu ajuizamento.",
      "D) Quando o legislador não informa a espécie de ação penal no tipo penal, presume-se tratar-se de ação penal privada, por ser a modalidade mais protetiva ao ofendido.",
      "E) O princípio da obrigatoriedade, que rege a ação penal pública incondicionada, aplica-se apenas na fase processual, após o oferecimento da denúncia."
    ],
    gabarito: 1,
    comentario: `Correto. O art. 25 do CPP é claro: "A representação será irretratável depois de oferecida a denúncia." A regra geral (fora da Lei Maria da Penha) é que a retratação só pode ocorrer até o oferecimento da denúncia pelo MP. <br><br>
    <b>Erros:</b> A) Errado — a APPI é regida pela <i>oficiosidade e obrigatoriedade</i>, não pela oportunidade. C) Errado — a ação penal privada é regida pela <i>disponibilidade</i>. D) Errado — quando silencia, a lei presume ação pública incondicionada (regra geral). E) Errado — a obrigatoriedade aplica-se na fase <i>pré-processual</i>; na processual vigora a indisponibilidade.`
  },
  {
    enunciado: `João foi vítima de ameaça por parte de seu colega de trabalho. A autoridade policial tomou ciência dos fatos e instaurou o inquérito policial de ofício. O Ministério Público, ao receber os autos, ofereceu denúncia sem qualquer manifestação do ofendido. Nessa situação hipotética, considerando que o crime de ameaça é de ação penal pública condicionada à representação, é correto afirmar que:`,
    opcoes: [
      "A) O procedimento adotado pela autoridade policial e pelo Ministério Público está correto, pois a ação penal pública independe de qualquer autorização do ofendido.",
      "B) Tanto a instauração do inquérito policial quanto o oferecimento da denúncia são nulos, por ausência da representação do ofendido, que constitui condição de procedibilidade.",
      "C) Apenas a denúncia é nula, pois a instauração do inquérito policial independe de representação.",
      "D) O vício é sanável, bastando que o ofendido ratifique a representação no prazo de 30 dias a contar do oferecimento da denúncia.",
      "E) O Ministério Público poderia oferecer a denúncia, mas o juiz só poderá recebê-la após a manifestação do ofendido."
    ],
    gabarito: 1,
    comentario: `Correto. Na ação penal pública condicionada à representação, a manifestação do ofendido é <b>condição de procedibilidade</b>, tanto para a instauração do IP pelo delegado quanto para o oferecimento da denúncia pelo MP. Sem ela, ambos os atos são viciados. O MP só pode agir após ter em mãos a representação do ofendido ou de seu representante legal.`
  },
  {
    enunciado: `Considere a seguinte situação: Carlos foi vítima de difamação praticada por Mário e Paulo, que agiram em conjunto. Carlos, por razões pessoais, decidiu oferecer queixa-crime apenas contra Mário, deixando de incluir Paulo na peça acusatória. O Ministério Público, ao receber os autos, deve:`,
    opcoes: [
      "A) Declinar de atuar na ação penal privada, pois não é o titular desse tipo de ação.",
      "B) Promover imediatamente o arquivamento da queixa, reconhecendo a renúncia tácita ao direito de queixa em relação a Paulo, extensiva a Mário.",
      "C) Aditar a queixa-crime para incluir Paulo, zelando pelo princípio da indivisibilidade da ação penal privada.",
      "D) Zelar pelo princípio da indivisibilidade e propor ao querelante que faça o aditamento, pois a omissão de um dos autores implica renúncia tácita extensível a todos.",
      "E) Notificar Carlos para que, em 3 dias, esclareça as razões pelas quais não incluiu Paulo na queixa, sob pena de extinção da punibilidade."
    ],
    gabarito: 3,
    comentario: `Correto. O MP, na ação penal privada, atua como <i>custos legis</i> (fiscal da lei). Ao perceber que o querelante violou o princípio da <b>indivisibilidade</b> (art. 48 CPP), o MP deve zelar por esse princípio e propor ao querelante que faça o aditamento — mas não pode fazê-lo de ofício, pois a titularidade é do ofendido. A não inclusão de coautor conhecido configura renúncia tácita que se estende a todos (arts. 48 e 49 CPP), podendo resultar na extinção da punibilidade. Diferente da ação pública, em que o MP pode aditar diretamente.`
  },
  {
    enunciado: `Sobre os institutos da decadência, renúncia, perdão e perempção no Direito Processual Penal, assinale a alternativa INCORRETA:`,
    opcoes: [
      "A) A renúncia ao exercício do direito de queixa é ato unilateral e irretratável, que somente pode ocorrer antes do oferecimento da queixa-crime, operando a extinção da punibilidade.",
      "B) O perdão do ofendido, concedido a um dos querelados, aproveitará a todos, mas não produzirá efeito em relação ao que o recusar.",
      "C) Ocorre a perempção quando o querelante, após iniciada a ação, deixa de promover o andamento do processo por 30 dias seguidos, configurando negligência processual.",
      "D) Na ação penal privada subsidiária da pública, o prazo decadencial de 6 meses para o ofendido oferecer a queixa-crime é contado a partir da data em que o Ministério Público arquivou o inquérito policial.",
      "E) O prazo de decadência não pode ser suspenso, prorrogado ou interrompido, sendo contado como prazo penal — inclui-se o dia do começo e exclui-se o dia do vencimento."
    ],
    gabarito: 3,
    comentario: `Incorreta (portanto, é a resposta). O prazo decadencial da <b>ação penal privada subsidiária da pública</b> começa a correr a partir do <b>fim do prazo do MP para oferecer a denúncia</b> (art. 38 CPP, parte final), não do arquivamento. Aliás, se o MP arquivou, sequer cabe a subsidiária — ela só é cabível quando o MP é omisso/inerte, não quando se manifesta. Todas as demais alternativas estão corretas: A) renúncia é pré-processual e unilateral; B) perdão aproveita a todos salvo quem recusa (art. 51 CPP); C) é uma das hipóteses de perempção (art. 60, I CPP); E) regra da contagem do prazo decadencial.`
  },
  {
    enunciado: `O Ministério Público instaurou procedimento investigatório e, ao final, não ofereceu denúncia no prazo legal, permanecendo inerte. A vítima, então, ajuizou ação penal privada subsidiária da pública. Sobre esse instituto, assinale a alternativa CORRETA:`,
    opcoes: [
      "A) O Ministério Público perde definitivamente a titularidade da ação penal, que passa ao ofendido, podendo este desistir ou perdoar o acusado nos mesmos moldes da ação penal privada comum.",
      "B) Se a vítima não exercer o direito de queixa no prazo de 6 meses contado do fim do prazo do MP, ocorre a decadência imprópria, e a titularidade da ação retorna ao Ministério Público.",
      "C) O Ministério Público não poderá intervir no processo após o ajuizamento da queixa subsidiária, pois a iniciativa da ação foi do ofendido.",
      "D) A ação penal privada subsidiária da pública é cabível tanto quando o MP é omisso quanto quando requerer o arquivamento do inquérito, pois em ambos os casos há inércia estatal.",
      "E) Caso o querelante seja negligente na condução da ação subsidiária, operar-se-á a perempção, extinguindo-se definitivamente a punibilidade do acusado."
    ],
    gabarito: 1,
    comentario: `Correto. Este é o fenômeno da <b>decadência imprópria</b>: se o ofendido não exercer a subsidiária no prazo de 6 meses, o direito não se extingue definitivamente — ele simplesmente retorna ao MP, que pode oferecer a denúncia até a prescrição do crime. <br><br>
    <b>Erros:</b> A) O MP não perde a titularidade — continua podendo aditar, repudiar a queixa e oferecer denúncia substitutiva (art. 29 CPP). C) O MP intervém em todos os atos. D) Se o MP arquivou, não há subsidiária cabível — ele se manifestou. E) Não há perempção na subsidiária da pública; se o querelante for negligente, o MP retoma como parte principal.`
  }
];

let acertos = 0;
let errosCount = 0;
let errosLog = [];
let respondidas = 0;
const total = questoes.length;

function renderQuiz() {
  const area = document.getElementById('quiz-area');
  area.innerHTML = '';
  questoes.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = `card-${i}`;
    card.innerHTML = `
      <div class="question-header">
        <div class="q-num">${i+1}</div>
        <div class="q-text">${q.enunciado}</div>
      </div>
      <div class="options" id="opts-${i}">
        ${q.opcoes.map((op, j) => `<button class="option-btn" onclick="responder(${i},${j})" id="opt-${i}-${j}">${op}</button>`).join('')}
      </div>
      <div class="feedback" id="fb-${i}"></div>
    `;
    area.appendChild(card);
  });
  atualizarPlacar();
}

function responder(qi, oi) {
  const q = questoes[qi];
  const opts = document.querySelectorAll(`#opts-${qi} .option-btn`);
  opts.forEach(b => b.disabled = true);

  const fb = document.getElementById(`fb-${qi}`);
  const btnEscolhido = document.getElementById(`opt-${qi}-${oi}`);
  const btnCorreto = document.getElementById(`opt-${qi}-${q.gabarito}`);

  if (oi === q.gabarito) {
    acertos++;
    btnEscolhido.classList.add('correct');
    fb.className = 'feedback show correct-fb';
    fb.innerHTML = `✅ <b>Correto!</b> ${q.comentario}`;
  } else {
    errosCount++;
    btnEscolhido.classList.add('wrong');
    btnCorreto.classList.add('reveal-correct');
    fb.className = 'feedback show wrong-fb';
    fb.innerHTML = `❌ <b>Incorreto.</b> A resposta correta é a alternativa ${String.fromCharCode(65 + q.gabarito)}. ${q.comentario}`;
    errosLog.push({ num: qi+1, enunciado: q.enunciado.substring(0,120)+'...', gabarito: q.opcoes[q.gabarito] });
  }

  respondidas++;
  atualizarPlacar();

  if (respondidas === total) {
    setTimeout(mostrarResultado, 600);
  }
}

function atualizarPlacar() {
  document.getElementById('acertos').textContent = acertos;
  document.getElementById('erros-count').textContent = errosCount;
  document.getElementById('q-atual').textContent = `${Math.min(respondidas+1, total)}/${total}`;
  document.getElementById('progress').style.width = `${(respondidas/total)*100}%`;
}

function mostrarResultado() {
  document.getElementById('result').classList.add('show');
  document.getElementById('final-score').textContent = `${acertos}/${total}`;

  const msgs = ['Continue estudando! Revise o material.','Razoável, mas há pontos a melhorar.','Bom resultado! Revise os erros.','Muito bom! Quase perfeito.','Excelente! Domínio total do tema!'];
  const cores = ['#f03e3e','#fd7e14','#ffd43b','#74c0fc','#40c057'];
  const idx = Math.min(acertos, 4);
  document.getElementById('final-score').style.color = cores[idx];
  document.getElementById('result-msg').textContent = msgs[idx];

  const errosSec = document.getElementById('erros-section');
  if (errosLog.length > 0) {
    errosSec.innerHTML = `<h3>📋 Questões para revisar (${errosLog.length}):</h3>` +
      errosLog.map(e => `<div class="erro-item"><b>Q${e.num}:</b> ${e.enunciado}<br><span style="color:#b2f2bb">✓ ${e.gabarito}</span></div>`).join('');
  } else {
    errosSec.innerHTML = `<p style="color:#b2f2bb;margin-top:12px">🎯 Gabaritou! Nenhum erro registrado.</p>`;
  }

  // Salvar erros no caderno
  salvarErros();
}

function salvarErros() {
  if (errosLog.length === 0) return;
  // Indica ao usuário que os erros foram registrados
  const errosSec = document.getElementById('erros-section');
  errosSec.innerHTML += `<p style="color:#4fc3f7;font-size:0.8rem;margin-top:10px">💾 Erros registrados para revisão — salve este arquivo em 04_Caderno_Erros/</p>`;
}

function restart() {
  acertos = 0; errosCount = 0; errosLog = []; respondidas = 0;
  document.getElementById('result').classList.remove('show');
  renderQuiz();
}

renderQuiz();
</script>
</body>
</html>
